<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE BUTTON — proo.space</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0a0a;--white:#f0f0f0;}
body{
  background:var(--bg);
  font-family:'Rajdhani',sans-serif;
  color:var(--white);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  cursor:none;
  user-select:none;
}

/* cursor */
#cur{position:fixed;width:14px;height:14px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:background 0.2s,transform 0.1s;background:#fff;mix-blend-mode:difference;}

/* bg blob */
#blob{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
  transition:background 0.5s;
}

/* noise */
body::after{content:'';position:fixed;inset:0;opacity:0.12;pointer-events:none;z-index:1000;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:0;width:90%;max-width:700px;}

/* counter */
.counter{
  font-family:'Black Ops One',cursive;
  font-size:11px;letter-spacing:4px;
  color:rgba(255,255,255,0.15);
  margin-bottom:30px;
  transition:color 0.3s;
}

/* output card */
#output{
  min-height:140px;
  width:100%;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  text-align:center;
  padding:30px 20px;
  margin-bottom:40px;
  position:relative;
  transition:all 0.3s;
}

.out-tag{
  font-size:9px;letter-spacing:5px;
  margin-bottom:14px;
  font-weight:700;
  opacity:0.5;
}

.out-text{
  font-size:clamp(18px,4.5vw,28px);
  font-weight:700;
  line-height:1.4;
  letter-spacing:0.3px;
  transition:color 0.3s;
}

.out-sub{
  font-size:12px;
  margin-top:12px;
  opacity:0.3;
  letter-spacing:1px;
  font-style:italic;
}

/* THE BUTTON */
#btn{
  font-family:'Black Ops One',cursive;
  font-size:clamp(22px,6vw,36px);
  letter-spacing:5px;
  padding:22px 60px;
  background:var(--white);
  color:#000;
  border:none;
  cursor:none;
  position:relative;
  overflow:hidden;
  transition:transform 0.08s,box-shadow 0.2s;
  box-shadow:0 0 0 rgba(255,255,255,0);
}
#btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,0,0,0.1),transparent);
  transform:translateX(-100%);
  animation:shine 3s infinite;
}
@keyframes shine{to{transform:translateX(100%);}}
#btn:hover{transform:scale(1.04);box-shadow:0 0 40px rgba(255,255,255,0.15);}
#btn:active{transform:scale(0.95);}

.hint{
  margin-top:20px;
  font-size:10px;letter-spacing:3px;
  color:rgba(255,255,255,0.1);
}

/* FLASH OVERLAY */
#flash{
  position:fixed;inset:0;z-index:500;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.1s;
}

/* PARTICLES */
.p{position:fixed;pointer-events:none;z-index:400;border-radius:50%;animation:pfall ease forwards;}
@keyframes pfall{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}}

/* shake */
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px) rotate(-1deg);}75%{transform:translateX(8px) rotate(1deg);}}
.shake{animation:shake 0.3s ease;}

/* slide in */
@keyframes slidein{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.slidein{animation:slidein 0.3s ease forwards;}

/* categories styling */
.cat-hacker .out-tag{color:#00ff88;}
.cat-hacker .out-text{color:#00ff88;}
.cat-hacker #btn{background:#00ff88;color:#000;}

.cat-aunty .out-tag{color:#ff88cc;}
.cat-aunty .out-text{color:#ff88cc;}
.cat-aunty #btn{background:#ff88cc;color:#000;}

.cat-advice .out-tag{color:#ffd700;}
.cat-advice .out-text{color:#ffd700;}
.cat-advice #btn{background:#ffd700;color:#000;}

.cat-roast .out-tag{color:#ff4422;}
.cat-roast .out-text{color:#ff4422;}
.cat-roast #btn{background:#ff4422;color:#fff;}

.cat-fact .out-tag{color:#88aaff;}
.cat-fact .out-text{color:#88aaff;}
.cat-fact #btn{background:#88aaff;color:#000;}

.cat-desi .out-tag{color:#ff8800;}
.cat-desi .out-text{color:#ff8800;}
.cat-desi #btn{background:#ff8800;color:#000;}

@media(hover:none){#cur{display:none;}*{cursor:auto!important;}#btn:hover{transform:none;}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="blob"></div>
<div id="flash"></div>

<div class="wrap">
  <div class="counter" id="counter">CLICK THE BUTTON. TRUST.</div>
  <div id="output">
    <div class="out-tag" id="out-tag">???</div>
    <div class="out-text" id="out-text">Kuch toh hoga. Ya nahi bhi hoga.</div>
    <div class="out-sub" id="out-sub">proo.space ki taraf se namaste</div>
  </div>
  <button id="btn" onclick="go()">PRESS ME</button>
  <div class="hint" id="hint">NO IDEA WHAT WILL HAPPEN. THAT'S THE POINT.</div>
</div>

<script>

document.addEventListener('mouseup',()=>cur.style.transform='translate(-50%,-50%) scale(1)');

const CATS=Object.keys(CONTENT);
const CAT_LABELS={
  hacker:"⚡ HACKER MODE",aunty:"👁️ AUNTY NETWORK",
  advice:"🧠 LIFE ADVICE",roast:"🔥 YOU'VE BEEN ROASTED",
  fact:"📡 USELESS FACT",desi:"🫓 DESI MOMENT"
};

let clicks=0;
let lastCat='';
const used={};
CATS.forEach(c=>used[c]=new Set());

function go(){
  clicks++;
  updateCounter();

  // pick category (not same twice in a row)
  let cats=CATS.filter(c=>c!==lastCat);
  const cat=cats[Math.floor(Math.random()*cats.length)];
  lastCat=cat;

  // pick unused item from category
  const pool=CONTENT[cat];
  let available=pool.filter((_,i)=>!used[cat].has(i));
  if(available.length===0){used[cat].clear();available=pool;}
  const idx=pool.indexOf(available[Math.floor(Math.random()*available.length)]);
  used[cat].add(idx);
  const item=pool[idx];

  // flash
  flash(cat);

  // shake body
  document.querySelector('.wrap').classList.remove('shake');
  void document.querySelector('.wrap').offsetWidth;
  document.querySelector('.wrap').classList.add('shake');
  setTimeout(()=>document.querySelector('.wrap').classList.remove('shake'),300);

  // particles
  burst(cat);

  // update content
  setTimeout(()=>{
    // remove old cat class
    CATS.forEach(c=>document.body.classList.remove('cat-'+c));
    document.body.classList.add('cat-'+cat);

    document.getElementById('out-tag').textContent=CAT_LABELS[cat];
    const textEl=document.getElementById('out-text');
    textEl.textContent=item.m;
    document.getElementById('out-sub').textContent=item.sub;

    textEl.classList.remove('slidein');
    void textEl.offsetWidth;
    textEl.classList.add('slidein');

    // blob color
    const colors={hacker:'rgba(0,255,136,0.06)',aunty:'rgba(255,136,204,0.06)',advice:'rgba(255,215,0,0.06)',roast:'rgba(255,68,34,0.06)',fact:'rgba(136,170,255,0.06)',desi:'rgba(255,136,0,0.06)'};
    document.getElementById('blob').style.background=`radial-gradient(ellipse at 50% 50%, ${colors[cat]} 0%, transparent 70%)`;
  },80);
}

function updateCounter(){
  const msgs=['CLICK THE BUTTON. TRUST.','AGAIN.','KEEP GOING.','SERIOUSLY?','TU BORED HAI NA.','EXPECTED.','EK AUR.','OKAY THEEK HAI.','RESPECT.','ALMOST KUCH HUA.'];
  const c=document.getElementById('counter');
  if(clicks<=1) c.textContent='CLICK #'+clicks+' — SHURU HUA';
  else if(clicks<10) c.textContent='CLICK #'+clicks+' — '+msgs[Math.min(clicks-1,msgs.length-1)];
  else if(clicks===10) c.textContent='10 CLICKS — TU BORED HAI CONFIRMED';
  else if(clicks===20) c.textContent='20 CLICKS — BHAI BAHAR JA';
  else if(clicks===50) c.textContent='50 CLICKS — CERTIFIED TIME WASTER 🏆';
  else if(clicks===100) c.textContent='100 CLICKS. WE HAVE NO WORDS. RESPECT.';
  else c.textContent='CLICK #'+clicks+' — TU NAHI RUKEGA/RUKEGI';
}

function flash(cat){
  const colors={hacker:'#00ff88',aunty:'#ff88cc',advice:'#ffd700',roast:'#ff4422',fact:'#88aaff',desi:'#ff8800'};
  const f=document.getElementById('flash');
  f.style.background=colors[cat];
  f.style.opacity='0.06';
  setTimeout(()=>f.style.opacity='0',150);
}

function burst(cat){
  const colors={hacker:'#00ff88',aunty:'#ff88cc',advice:'#ffd700',roast:'#ff4422',fact:'#88aaff',desi:'#ff8800'};
  const btn=document.getElementById('btn');
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='p';
    const sz=Math.random()*8+3;
    const ang=Math.random()*Math.PI*2;
    const dist=Math.random()*80+30;
    const dx=Math.cos(ang)*dist,dy=Math.sin(ang)*dist;
    const dur=Math.random()*0.4+0.3;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${colors[cat]};--dx:${dx}px;--dy:${dy}px;animation-duration:${dur}s;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000+100);
  }
}
</script>
